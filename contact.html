<div class="panel" style="margin-top:18px"><h3>Service Request Form</h3><p class="small" style="margin-top:0">Fill this out and we'll get back to you ASAP to schedule service.</p><form id="serviceForm" method="POST" action="/api/service-request" style="margin-top:12px"><div style="margin-bottom:14px;"><label for="name" style="display:block; margin-bottom:4px; font-weight:500;">Name *</label><input type="text" id="name" name="name" required style="width:100%; padding:8px; border:1px solid #ccc; border-radius:4px; font-size:14px;"></div><div style="margin-bottom:14px;"><label for="phone" style="display:block; margin-bottom:4px; font-weight:500;">Phone Number *</label><input type="tel" id="phone" name="phone" required style="width:100%; padding:8px; border:1px solid #ccc; border-radius:4px; font-size:14px;"></div><div style="margin-bottom:14px;"><label for="email" style="display:block; margin-bottom:4px; font-weight:500;">Email *</label><input type="email" id="email" name="email" required style="width:100%; padding:8px; border:1px solid #ccc; border-radius:4px; font-size:14px;"></div><div style="margin-bottom:14px;"><label for="service" style="display:block; margin-bottom:4px; font-weight:500;">Service Needed *</label><select id="service" name="service" required style="width:100%; padding:8px; border:1px solid #ccc; border-radius:4px; font-size:14px;"><option value="">-- Select a service --</option><option value="heating">Heating</option><option value="cooling">Air Conditioning</option><option value="water-heater">Water Heater</option><option value="tune-up">Tune-Up</option><option value="indoor-air-quality">Indoor Air Quality</option><option value="plumbing-gas">Plumbing & Gas Piping</option><option value="other">Other</option></select></div><div style="margin-bottom:14px;"><label for="description" style="display:block; margin-bottom:4px; font-weight:500;">Description *</label><textarea id="description" name="description" required rows="4" style="width:100%; padding:8px; border:1px solid #ccc; border-radius:4px; font-size:14px; font-family:inherit;"></textarea></div><div style="margin-bottom:14px;"><label for="address" style="display:block; margin-bottom:4px; font-weight:500;">Address</label><input type="text" id="address" name="address" style="width:100%; padding:8px; border:1px solid #ccc; border-radius:4px; font-size:14px;"></div><button type="submit" class="btn primary" style="width:100%; cursor:pointer;">Submit Request</button><p id="formStatus" style="margin-top:12px; text-align:center; display:none;"></p></form></div>
